spring.application.name=restaurant

# --- PostgreSQL ---
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/restaurant}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}

# --- JPA ---
spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false

# --- JWT ---
# W produkcji nadpisz zmienna srodowiskowa JWT_SECRET (base64, min. 64 bajty)
app.jwt.secret=${JWT_SECRET:NWgK/7G7+UeO6ZxajPdlhnyS17uiZLTjQP2uYHrlJ1inuvllknan/CCysFhciujCLfGKfiL4hpq/BCnBj/mwCQ==}
app.jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}

# --- Kafka ---
spring.kafka.bootstrap-servers=${KAFKA_BOOTSTRAP:localhost:9092}
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer
spring.kafka.consumer.group-id=restaurant-kitchen
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.JsonDeserializer
spring.kafka.consumer.properties.spring.json.trusted.packages=com.restaurant.dto
